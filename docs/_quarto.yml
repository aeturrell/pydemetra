project:
  type: website

website:
  title: "pydemetra"
  favicon: icon.svg
  twitter-card: true
  navbar:
    left:
      - href: index.qmd
        text: Home
      - text: "Reference"
        file: reference/index.qmd
      - text: "Quick Start"
        file: quick_start.ipynb

format:
  html:
    theme: flatly
    css: styles.css
    toc: true

# tell quarto to read the generated sidebar
metadata-files:
  - _sidebar.yml


quartodoc:
  # the name used to import the package you want to create reference docs for
  package: pydemetra
  parser: google

  # write sidebar data to this file
  sidebar: _sidebar.yml

  sections:
    - title: "(S)ARIMA models"
      desc: "Functions to wrangle (S)arima models"
      contents:
        - arima_difference
        - arima_model
        - arima_properties
        - arima_sum
        - sarima_decompose
        - sarima_estimate
        - sarima_hannan_rissanen
        - sarima_model
        - sarima_properties
        - sarima_random
        - ucarima_canonical
        - ucarima_estimate
        - ucarima_model
        - ucarima_wk
    - title: "Calendars & holidays"
      desc: "Calendar definitions, holidays, and trading-day variables"
      contents:
        - calendar_td
        - chained_calendar
        - easter_dates
        - easter_day
        - fixed_day
        - fixed_week_day
        - holidays
        - long_term_mean
        - national_calendar
        - single_day
        - special_day
        - stock_td
        - td
        - weighted_calendar
    - title: "Regression variables"
